<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    template="/view/layout/admin.xhtml">

    <ui:define name="title">Serviços disponíveis</ui:define>

    <ui:define name="content">

        <style>
            :root {
                --svc-primary: #2563eb;
                --svc-primary-dark: #1d4ed8;
                --svc-secondary: #7c3aed;
                --svc-success: #16a34a;
                --svc-warning: #f59e0b;
                --svc-danger: #dc2626;
                --svc-ink: #0f172a;
                --svc-muted: #64748b;
                --svc-light: #f8fafc;
                --svc-border: #e2e8f0;
                --svc-card: #ffffff;
                --svc-radius: 22px;
                --svc-radius-sm: 14px;
                --svc-shadow: 0 22px 55px rgba(15, 23, 42, .10);
                --svc-shadow-soft: 0 12px 28px rgba(15, 23, 42, .08);
            }

            .svc-page {
                min-height: 100vh;
                padding: 28px 16px;
                background:
                    radial-gradient(circle at top left, rgba(37, 99, 235, .15), transparent 32%),
                    radial-gradient(circle at top right, rgba(124, 58, 237, .14), transparent 34%),
                    linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            }

            .svc-shell {
                max-width: 1240px;
                margin: 0 auto;
            }

            .svc-hero {
                position: relative;
                overflow: hidden;
                border-radius: 28px;
                padding: 10px 30px;
                color: #fff;
                background:
                    linear-gradient(135deg, rgba(37, 99, 235, .98), rgba(124, 58, 237, .95));
                box-shadow: var(--svc-shadow);
                margin-bottom: 22px;
            }

            .svc-hero:after {
                content: "";
                position: absolute;
                width: 300px;
                height: 300px;
                border-radius: 50%;
                right: -90px;
                top: -110px;
                background: rgba(255,255,255,.18);
            }

            .svc-hero-content {
                position: relative;
                z-index: 2;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 18px;
                flex-wrap: wrap;
            }

            .svc-title {
                font-size: 1.75rem;
                font-weight: 600;
                margin: 0;
                letter-spacing: -0.04em;
            }

            .svc-subtitle {
                margin: 8px 0 0;
                color: rgba(255,255,255,.86);
                font-size: .95rem;
            }

            .svc-status-pill {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 10px 16px;
                border-radius: 999px;
                background: rgba(255,255,255,.17);
                border: 1px solid rgba(255,255,255,.25);
                color: #fff;
                font-weight: 600;
                font-size: .82rem;
                backdrop-filter: blur(8px);
            }

            .svc-panel {
                background: rgba(255,255,255,.94);
                border: 1px solid rgba(226,232,240,.90);
                border-radius: var(--svc-radius);
                box-shadow: var(--svc-shadow);
                padding: 24px;
                backdrop-filter: blur(10px);
            }

            .filter-card {
                background: #fff;
                border: 1px solid var(--svc-border);
                border-radius: 20px;
                padding: 18px;
                box-shadow: var(--svc-shadow-soft);
                margin-bottom: 22px;
            }

            .filter-label {
                display: flex;
                align-items: center;
                gap: 7px;
                color: var(--svc-ink);
                font-size: .78rem;
                margin-bottom: 8px;
                text-transform: uppercase;
                letter-spacing: .04em;
            }

            .form-select {
                min-height: 46px;
                border-radius: 14px !important;
                border: 1px solid var(--svc-border) !important;
                color: var(--svc-ink);
                box-shadow: none !important;
            }

            .form-select:focus {
                border-color: rgba(37,99,235,.65) !important;
                box-shadow: 0 0 0 4px rgba(37,99,235,.11) !important;
            }

            .svc-actions {
                display: flex;
                gap: 12px;
                margin-top: 18px;
            }

            .btn-premium {
                border: none;
                min-height: 46px;
                border-radius: 999px;
                padding: 11px 26px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                color: #fff !important;
                font-weight: 600;
                text-decoration: none;
                background: linear-gradient(135deg, var(--svc-primary), var(--svc-secondary));
                box-shadow: 0 14px 32px rgba(37,99,235,.25);
                transition: .18s ease;
            }

            .btn-premium:hover {
                transform: translateY(-1px);
                filter: brightness(.98);
            }

            .btn-clean {
                min-height: 46px;
                border-radius: 999px;
                border: 1px solid var(--svc-border);
                background: #fff;
                color: var(--svc-muted);
                font-weight: 600;
                padding: 10px 24px;
                transition: .18s ease;
            }

            .btn-clean:hover {
                color: var(--svc-primary);
                border-color: rgba(37,99,235,.35);
                background: #eff6ff;
            }

            .result-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 16px;
            }

            .result-title {
                display: flex;
                align-items: center;
                gap: 9px;
                color: var(--svc-ink);
            }

            .result-count-pill {
                min-width: 38px;
                height: 30px;
                border-radius: 999px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                background: #eff6ff;
                border: 1px solid #bfdbfe;
                color: #1d4ed8;
                font-weight: 600;
            }

            .empty-state {
                border: 1px dashed #cbd5e1;
                background: #fff;
                border-radius: 22px;
                padding: 52px 20px;
                text-align: center;
                color: var(--svc-muted);
            }

            .empty-state i {
                width: 58px;
                height: 58px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 20px;
                background: #eff6ff;
                color: var(--svc-primary);
                font-size: 1.7rem;
                margin-bottom: 12px;
            }

            .professional-card {
                background: var(--svc-card);
                border: 1px solid var(--svc-border);
                border-radius: 22px;
                padding: 18px;
                height: 100%;
                display: flex;
                flex-direction: column;
                box-shadow: 0 8px 22px rgba(15,23,42,.05);
                transition: .20s ease;
            }

            .professional-card:hover {
                transform: translateY(-5px);
                box-shadow: var(--svc-shadow-soft);
                border-color: rgba(37,99,235,.30);
            }

            .prof-header {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 14px;
            }

            .prof-photo {
                width: 74px;
                height: 74px;
                object-fit: cover;
                border-radius: 22px;
                border: 3px solid #fff;
                box-shadow: 0 10px 24px rgba(15,23,42,.14);
                background: #e2e8f0;
            }

            .location-tag {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                background: #f8fafc;
                color: #475569;
                font-size: .68rem;
                font-weight: 600;
                padding: 7px 10px;
                border-radius: 999px;
                border: 1px solid var(--svc-border);
                text-transform: uppercase;
                max-width: 150px;
                text-align: right;
            }

            .prof-name {
                color: var(--svc-ink);
                font-size: 1rem;
                font-weight: 600;
                margin: 0 0 4px;
                letter-spacing: -.02em;
            }

            .section-mini-title {
                margin: 14px 0 8px;
                color: #94a3b8;
                font-size: .68rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: .08em;
            }

            .service-item {
                padding: 11px 0;
                border-bottom: 1px solid #f1f5f9;
            }

            .service-name {
                color: var(--svc-ink);
                font-size: .84rem;
                font-weight: 850;
            }

            .service-name.selected {
                color: var(--svc-primary);
            }

            .registro-badge {
                background: #f8fafc;
                color: #64748b;
                border: 1px solid var(--svc-border);
                font-size: .62rem;
                border-radius: 999px;
                padding: 4px 8px;
                font-weight: 600;
            }

            .price-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 8px;
                margin-top: 8px;
                flex-wrap: wrap;
            }

            .price-text {
                color: var(--svc-muted);
                font-size: .72rem;
                font-weight: 700;
            }

            .guide-price {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                background: #dcfce7;
                color: #166534;
                border: 1px solid #bbf7d0;
                border-radius: 999px;
                padding: 5px 9px;
                font-size: .67rem;
                font-weight: 600;
            }

            .pay-info {
                margin-top: 14px;
                padding: 12px;
                border-radius: 16px;
                background: #fffbeb;
                border: 1px dashed #fde68a;
                color: #854d0e;
                text-align: center;
                font-size: .70rem;
                font-weight: 600;
                line-height: 1.45;
            }

            .btn-action-outline {
                width: 100%;
                min-height: 42px;
                border-radius: 14px;
                border: 1px solid #bfdbfe;
                background: #eff6ff;
                color: #1d4ed8;
                font-weight: 600;
                font-size: .80rem;
                transition: .18s ease;
            }

            .btn-action-outline:hover {
                background: #dbeafe;
                color: #1e40af;
            }

            .btn-primary-modern {
                width: 100%;
                min-height: 44px;
                border: none;
                border-radius: 14px;
                color: #fff;
                background: linear-gradient(135deg, var(--svc-primary), var(--svc-primary-dark));
                font-weight: 600;
                box-shadow: 0 12px 26px rgba(37,99,235,.22);
            }

            .btn-primary-modern:hover {
                filter: brightness(.97);
                color: #fff;
            }

            .horarios-container {
                margin-top: 10px;
                padding: 10px;
                border-radius: 16px;
                background: #f8fafc;
                border: 1px solid var(--svc-border);
            }

            .day-card {
                background: #fff;
                border: 1px solid var(--svc-border);
                border-radius: 14px;
                margin-bottom: 8px;
                overflow: hidden;
            }

            .day-head {
                width: 100%;
                border: none;
                background: #fff;
                padding: 11px 12px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                color: var(--svc-ink);
                font-size: .78rem;
                font-weight: 600;
                text-align: left;
            }

            .day-head .meta {
                color: var(--svc-muted);
                font-size: .70rem;
                font-weight: 600;
                white-space: nowrap;
            }

            .day-body {
                display: none;
                padding: 12px;
                border-top: 1px solid #f1f5f9;
                background: #fafafa;
            }

            .day-card.open .day-body {
                display: block;
            }

            .mini-pill-wrap {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .mini-pill {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: #fff;
                border: 1px solid #dbeafe;
                color: #1e3a8a;
                padding: 6px 10px;
                border-radius: 999px;
                font-size: .72rem;
                font-weight: 600;
            }

            .agenda-help {
                margin-top: 10px;
                color: var(--svc-muted);
                font-size: .72rem;
                line-height: 1.45;
            }

            @media (max-width: 768px) {
                .svc-page {
                    padding: 14px 10px;
                }

                .svc-hero {
                    padding: 22px;
                    border-radius: 22px;
                }

                .svc-title {
                    font-size: 1.35rem;
                }

                .svc-panel {
                    padding: 16px;
                }

                .svc-actions {
                    flex-direction: column;
                }

                .btn-clean,
                .btn-premium {
                    width: 100%;
                }

                .day-head {
                    flex-direction: column;
                    align-items: flex-start;
                }

                .day-head .meta {
                    white-space: normal;
                }
            }
            
            .form-control,
				.form-select {
				    min-height: 46px;
				    border-radius: 14px !important;
				    border: 1px solid var(--svc-border) !important;
				    color: var(--svc-ink);
				    box-shadow: none !important;
				}
				
				.form-control:focus,
				.form-select:focus {
				    border-color: rgba(37,99,235,.65) !important;
				    box-shadow: 0 0 0 4px rgba(37,99,235,.11) !important;
				}

        </style>

        <div class="svc-page">
            <div class="svc-shell">

                <section class="svc-hero">
                    <div class="svc-hero-content">
                        <div>
                            <h1 class="svc-title">Serviços disponíveis</h1>
                            <p class="svc-subtitle">
                                Encontre profissionais por especialidade, estado e município.
                            </p>
                        </div>

                        <span id="badgeResumo" class="svc-status-pill">
                            <i class="bi bi-funnel"></i>
                            Pronto para buscar
                        </span>
                    </div>
                </section>

                <section class="svc-panel">

                    <div class="filter-card">
                       <div class="row g-3">
						    <div class="col-md-3">
						        <label class="filter-label">
						            <i class="bi bi-person"></i>
						            Nome do profissional
						        </label>
						        <input id="nomeInput"
						               type="text"
						               class="form-control"
						               placeholder="Digite o nome..." />
						    </div>
						
						    <div class="col-md-3">
						        <label class="filter-label">
						            <i class="bi bi-briefcase-medical"></i>
						            Especialidade
						        </label>
						        <select id="especialidadeSelect" class="form-select"></select>
						    </div>
						
						    <div class="col-md-3">
						        <label class="filter-label">
						            <i class="bi bi-map"></i>
						            Estado
						        </label>
						        <select id="stateSelect" class="form-select"></select>
						    </div>
						
						    <div class="col-md-3">
						        <label class="filter-label">
						            <i class="bi bi-geo-alt"></i>
						            Município
						        </label>
						        <select id="citySelect" class="form-select" disabled="true"></select>
						    </div>
						</div>

                        <div class="svc-actions">
                            <button id="btnSearch" type="button" class="btn-premium flex-fill">
                                <i class="bi bi-search"></i>
                                Pesquisar profissionais
                            </button>

                            <button type="button" class="btn-clean" onclick="window.location.reload();">
                                <i class="bi bi-arrow-clockwise me-1"></i>
                                Limpar
                            </button>
                        </div>
                    </div>

                    <div class="result-header">
                        <div class="result-title">
                            <i class="bi bi-grid-3x3-gap"></i>
                            Resultados encontrados
                        </div>

                        <span id="resultCount" class="result-count-pill">0</span>
                    </div>

                    <div id="results" class="row g-3">
                        <div class="col-12">
                            <div class="empty-state">
                                <i class="bi bi-search"></i>
                                <p class="mb-0 fw-bold">Selecione os filtros acima e clique em pesquisar.</p>
                                <small>Os profissionais disponíveis aparecerão aqui.</small>
                            </div>
                        </div>
                    </div>

                </section>
            </div>
        </div>

        <script type="text/javascript">
        //<![CDATA[
        (function () {
            var API_BASE = "/consulta/api";

            var espSelect = document.getElementById("especialidadeSelect");
            var stateSelect = document.getElementById("stateSelect");
            var citySelect = document.getElementById("citySelect");
            var nomeInput = document.getElementById("nomeInput");
            var btnSearch = document.getElementById("btnSearch");
            var badgeResumo = document.getElementById("badgeResumo");
            var resultCount = document.getElementById("resultCount");
            var results = document.getElementById("results");

            var COLABORADORES = [];

            function esc(s) {
                return s == null ? "" : String(s).replace(/[&<>"']/g, function (m) {
                    return {
                        "&": "&amp;",
                        "<": "&lt;",
                        ">": "&gt;",
                        "\"": "&quot;",
                        "'": "&#039;"
                    }[m];
                });
            }

            function normalize(s) {
                return (s || "")
                    .toString()
                    .trim()
                    .toLowerCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "");
            }

            function formatMoeda(v) {
                var n = Number(v);
                if (!isFinite(n)) return "";
                try {
                    return n.toLocaleString("pt-BR", {
                        style: "currency",
                        currency: "BRL"
                    });
                } catch (e) {
                    return "R$ " + n.toFixed(2).replace(".", ",");
                }
            }

            function formatDataBR(iso) {
                if (!iso) return "";
                var p = String(iso).split("-");
                return (p.length === 3) ? (p[2] + "/" + p[1] + "/" + p[0]) : iso;
            }

            async function fetchJson(url) {
                var r = await fetch(url, {
                    headers: { "Accept": "application/json" }
                });
                if (!r.ok) throw new Error("HTTP " + r.status);
                return r.json();
            }

            function renderAgenda(itens) {
                if (!Array.isArray(itens) || !itens.length) {
                    return '<div class="text-center small text-muted p-2">Sem disponibilidade</div>';
                }

                itens = itens.slice().sort(function (a, b) {
                    return String((a && a.data) || "").localeCompare(String((b && b.data) || ""));
                });

                var html = "";

                itens.forEach(function (x) {
                    if (!x || !x.data) return;

                    var data = x.data;
                    var vagas = Number(x.vagas || 0);
                    var janela = x.janela || "—";

                    html += ''
                        + '<div class="day-card">'
                        + '  <button type="button" class="day-head">'
                        + '    <span><i class="bi bi-calendar-event me-1"></i>' + esc(formatDataBR(data)) + '</span>'
                        + '    <span class="meta">'
                        +         esc(vagas) + ' vagas • ' + esc(janela)
                        + '      <i class="bi bi-chevron-down ms-1"></i>'
                        + '    </span>'
                        + '  </button>'
                        + '  <div class="day-body">'
                        + '    <div class="mini-pill-wrap">'
                        + '      <span class="mini-pill"><i class="bi bi-people-fill"></i> ' + esc(vagas) + ' vagas disponíveis</span>'
                        + '      <span class="mini-pill"><i class="bi bi-clock-fill"></i> ' + esc(janela) + '</span>'
                        + '    </div>'
                        + '    <div class="agenda-help">'
                        + '      Para agendar, selecione a especialidade e clique em <b>Agendar Consulta</b>.'
                        + '    </div>'
                        + '  </div>'
                        + '</div>';
                });

                return html;
            }

            window.__toggleHorarios = async function (colabId) {
                var el = document.getElementById("horarios_" + colabId);
                if (!el) return;

                if (el.style.display === "block") {
                    el.style.display = "none";
                    return;
                }

                el.style.display = "block";

                if (!el.dataset.loaded) {
                    el.dataset.loaded = "1";
                    el.innerHTML = '<div class="text-center py-2"><div class="spinner-border spinner-border-sm text-primary"></div></div>';

                    try {
                        var dados = await fetchJson(API_BASE + "/colaboradores/" + colabId + "/horarios-disponiveis");
                        el.innerHTML = renderAgenda(dados);

                        var heads = el.querySelectorAll(".day-head");
                        for (var i = 0; i < heads.length; i++) {
                            heads[i].onclick = function () {
                                var card = this.closest(".day-card");
                                if (card) card.classList.toggle("open");
                            };
                        }
                    } catch (err) {
                        console.error(err);
                        el.innerHTML = '<div class="text-center small text-danger">Erro ao carregar disponibilidade</div>';
                    }
                }
            };

            function cardColaborador(c, espFiltro) {
                var espParaEnviar = null;

                if (espFiltro) {
                    espParaEnviar = (c.especialidades || []).find(function (es) {
                        return normalize(es && es.nome) === normalize(espFiltro);
                    }) || null;
                }

                var horariosId = "horarios_" + c.id;
                var cidadeEstado = [c.cidade, c.estado].filter(Boolean).join(" - ");

                var servicesHtml = (c.especialidades || []).map(function (es) {
                    if (!es || !es.nome) return "";

                    var isSelected = espFiltro && normalize(es.nome) === normalize(espFiltro);
                    var vNormal = (es.valor != null) ? formatMoeda(es.valor) : "—";
                    var vGuia = (es.valorComGuia != null) ? formatMoeda(es.valorComGuia) : "—";
                    var infoRegistro = (es.conselho && es.registro)
                        ? esc(es.conselho) + " - " + esc(es.registro)
                        : "";

                    return ''
                        + '<div class="service-item">'
                        + '  <div class="d-flex justify-content-between align-items-start w-100 gap-2">'
                        + '    <div class="service-name ' + (isSelected ? 'selected' : '') + '">'
                        +         esc(es.nome)
                        + '    </div>'
                        + '    <span class="registro-badge">'
                        +         infoRegistro
                        + '    </span>'
                        + '  </div>'
                        + '  <div class="price-row">'
                        + '    <span class="price-text">Particular: <strong>' + esc(vNormal) + '</strong></span>'
                        + '    <span class="guide-price">'
                        + '      <i class="bi bi-ticket-perforated"></i> COM GUIA: <strong>' + esc(vGuia) + '</strong>'
                        + '    </span>'
                        + '  </div>'
                        + '</div>';
                }).join("");

                return ''
                    + '<div class="col-md-6 col-lg-4">'
                    + '  <div class="professional-card">'
                    + '    <div class="prof-header">'
                    + '      <img src="' + esc(c.foto) + '"'
                    + '        class="prof-photo"'
                    + '        onerror="this.src=\'/consulta/api/usuario/0/perfil\'" />'
                    + '      <span class="location-tag"><i class="bi bi-geo-alt-fill"></i>' + esc(cidadeEstado || "—") + '</span>'
                    + '    </div>'

                    + '    <h3 class="prof-name">' + esc(c.nome || "Profissional") + '</h3>'

                    + '    <div class="flex-grow-1">'
                    + '      <div class="section-mini-title">Especialidade e valores</div>'
                    +        (servicesHtml || '<div class="small text-muted">Sem especialidades</div>')

                    + '      <div class="pay-info">'
                    + '        <div><i class="bi bi-cash-coin me-1"></i> O valor da consulta é pago diretamente ao médico.</div>'
                    + '        <div><i class="bi bi-ticket-perforated me-1"></i> Valor da Guia: R$ 20,00</div>'
                    + '      </div>'
                    + '    </div>'

                    + '    <div class="mt-3">'
                    + '      <button class="btn-action-outline mb-2" type="button" onclick="window.__toggleHorarios(' + Number(c.id) + ')">'
                    + '        <i class="bi bi-calendar3 me-2"></i>Ver horários disponíveis'
                    + '      </button>'
                    + '      <div id="' + horariosId + '" style="display:none;" class="horarios-container"></div>'
                    +      (
                                espParaEnviar
                                ? '<form action="/consulta/paciente/agendamento" method="POST" class="m-0 w-100 mt-2">'
                                    + '<input type="hidden" name="id" value="' + esc(c.id) + '"/>'
                                    + '<input type="hidden" name="especialidade" value="' + esc(espParaEnviar.nome) + '"/>'
                                    + '<input type="hidden" name="valor" value="' + esc(espParaEnviar.valor) + '"/>'
                                    + '<input type="hidden" name="valorComGuia" value="' + esc(espParaEnviar.valorComGuia) + '"/>'
                                    + '<button type="submit" class="btn-primary-modern">Agendar Consulta</button>'
                                  + '</form>'
                                : '<div class="alert alert-warning py-2 mt-2 mb-0 text-center" style="font-size:0.75rem; border-radius:14px;">Selecione uma especialidade para agendar</div>'
                            )
                    + '    </div>'
                    + '  </div>'
                    + '</div>';
            }

            function preencherEspecialidades(especialidadeSel) {
                var set = new Set();

                COLABORADORES.forEach(function (c) {
                    (c.especialidades || []).forEach(function (es) {
                        if (es && es.nome) set.add(String(es.nome));
                    });
                });

                var esps = Array.from(set).sort(function (a, b) {
                    return String(a).localeCompare(String(b), "pt-BR");
                });

                espSelect.innerHTML = '<option value="">Qualquer especialidade</option>'
                    + esps.map(function (e) {
                        var sel = (especialidadeSel && normalize(e) === normalize(especialidadeSel)) ? ' selected="selected"' : '';
                        return '<option value="' + esc(e) + '"' + sel + '>' + esc(e) + '</option>';
                    }).join("");
            }

            function preencherEstados(ufSel) {
                var set = new Set();

                COLABORADORES.forEach(function (c) {
                    if (c.estado) set.add(String(c.estado));
                });

                var ufs = Array.from(set).sort();

                stateSelect.innerHTML = '<option value="">Estado</option>'
                    + ufs.map(function (uf) {
                        var sel = (ufSel && uf === ufSel) ? ' selected="selected"' : '';
                        return '<option value="' + esc(uf) + '"' + sel + '>' + esc(uf) + '</option>';
                    }).join("");
            }

            function preencherMunicipios(uf, cidadeSel) {
                citySelect.innerHTML = '<option value="">Cidade</option>';
                citySelect.disabled = !uf;

                if (!uf) return;

                var set = new Set();

                COLABORADORES.forEach(function (c) {
                    if (c.estado === uf && c.cidade) set.add(String(c.cidade));
                });

                var cidades = Array.from(set).sort(function (a, b) {
                    return String(a).localeCompare(String(b), "pt-BR");
                });

                citySelect.innerHTML = '<option value="">Cidade</option>'
                    + cidades.map(function (cid) {
                        var sel = (cidadeSel && cid === cidadeSel) ? ' selected="selected"' : '';
                        return '<option value="' + esc(cid) + '"' + sel + '>' + esc(cid) + '</option>';
                    }).join("");
            }

            function atualizarBadge(nome, esp, uf, cid) {
                var parts = [];

                if (nome) parts.push("Nome: " + nome);
                if (esp) parts.push(esp);
                if (uf) parts.push(uf);
                if (cid) parts.push(cid);

                badgeResumo.innerHTML =
                    '<i class="bi bi-check-circle"></i> ' +
                    (parts.length ? parts.map(esc).join(" • ") : "Geral");
            }

            function filtrarERenderizar() {
                var nomeDigitado = nomeInput ? nomeInput.value.trim() : "";
                var nome = normalize(nomeDigitado);

                var esp = (espSelect && espSelect.value) ? espSelect.value : "";
                var uf = (stateSelect && stateSelect.value) ? stateSelect.value : "";
                var cid = (!citySelect.disabled && citySelect.value) ? citySelect.value : "";

                var filtrados = COLABORADORES.filter(function (c) {

                    var matchNome =
                        !nome ||
                        normalize(c.nome).includes(nome);

                    var matchEsp =
                        !esp ||
                        (c.especialidades || []).some(function (e) {
                            return normalize(e && e.nome) === normalize(esp);
                        });

                    var matchUf =
                        !uf ||
                        c.estado === uf;

                    var matchCid =
                        !cid ||
                        c.cidade === cid;

                    return matchNome && matchEsp && matchUf && matchCid;
                });

                results.innerHTML = filtrados.length
                    ? filtrados.map(function (c) {
                        return cardColaborador(c, esp);
                    }).join("")
                    : '<div class="col-12"><div class="empty-state"><i class="bi bi-emoji-frown"></i><p class="mb-0 fw-bold">Nenhum profissional encontrado.</p><small>Tente mudar os filtros selecionados.</small></div></div>';

                resultCount.textContent = String(filtrados.length);
                atualizarBadge(nomeDigitado, esp, uf, cid);
            }

            async function init() {
                try {
                    var colaboradores = await fetchJson(API_BASE + "/colaboradores");
                    COLABORADORES = Array.isArray(colaboradores) ? colaboradores : [];

                    preencherEspecialidades();
                    preencherEstados();
                } catch (err) {
                    console.error(err);
                    results.innerHTML = '<div class="col-12"><div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p class="mb-0 fw-bold">Erro ao carregar dados da API.</p><small>Verifique se o endpoint está respondendo corretamente.</small></div></div>';
                }
            }

            btnSearch.addEventListener("click", filtrarERenderizar);

            nomeInput.addEventListener("keyup", function () {
                filtrarERenderizar();
            });

            espSelect.addEventListener("change", function () {
                filtrarERenderizar();
            });

            stateSelect.addEventListener("change", function () {
                preencherMunicipios(stateSelect.value, "");
                filtrarERenderizar();
            });

            citySelect.addEventListener("change", function () {
                filtrarERenderizar();
            });

            stateSelect.addEventListener("change", function () {
                preencherMunicipios(stateSelect.value, "");
            });

            init();
        })();
        //]]>
        </script>

    </ui:define>
</ui:composition>
