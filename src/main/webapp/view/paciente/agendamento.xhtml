<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    template="/view/layout/admin.xhtml">

    <ui:define name="title">Agendar Horário</ui:define>

    <ui:define name="content">

        <style>
            :root {
                --brand: #6366f1;
                --brand-dark: #4f46e5;
                --surface: #ffffff;
                --bg: #f1f5f9;
                --text-main: #1e293b;
                --text-muted: #64748b;
                --border: #e2e8f0;
                --radius: 16px;
                --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            }

            .svc-wrap {
                background: var(--bg);
                min-height: 100vh;
                padding: 2rem 1rem;
            }

            .premium-card {
                max-width: 1100px;
                margin: 0 auto;
                background: var(--surface);
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                padding: 2.5rem !important;
                border: 1px solid var(--border);
            }

            .header-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2rem;
                padding-bottom: 1.5rem;
                border-bottom: 1px solid var(--border);
                gap: 1rem;
                flex-wrap: wrap;
            }

            .profile-section {
                display: flex;
                align-items: center;
                gap: 1rem;
            }

            .avatar-circle {
                width: 56px;
                height: 56px;
                background: var(--brand);
                color: white;
                border-radius: 14px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.5rem;
                flex-shrink: 0;
            }

            .titlebox h1 {
                font-size: 1.25rem;
                font-weight: 700;
                color: var(--text-main);
                margin: 0;
            }

            .titlebox p {
                font-size: 0.875rem;
                color: var(--text-muted);
                margin: 2px 0 0;
            }

            .cal-premium {
                width: 100% !important;
                border: none !important;
            }

            .cal-premium .ui-datepicker {
                width: 100% !important;
                border: 1px solid var(--border) !important;
                border-radius: 12px;
                padding: 10px;
                box-shadow: none !important;
            }

            .cal-premium .ui-datepicker-header {
                background: none;
                border: none;
                color: var(--text-main);
            }

            .slots-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }

            .time-slot {
                background: #fff;
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 16px 8px;
                text-align: center;
                cursor: pointer;
                transition: all 0.2s ease;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                min-height: 88px;
            }

            .time-slot:hover {
                border-color: var(--brand);
                background: #f8faff;
                transform: translateY(-2px);
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }

            .time-slot .time-label {
                font-size: 1.05rem;
                font-weight: 700;
                color: var(--text-main);
            }

            .time-slot .status-tag {
                font-size: 0.65rem;
                font-weight: 700;
                color: #10b981;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .modal-agendamento .ui-dialog-titlebar {
                background: #fff;
                border-bottom: 1px solid var(--border);
                font-weight: 700;
            }

            .modal-agendamento .ui-dialog-content {
                padding: 1.25rem;
            }

            .btn-confirm {
                background: var(--brand) !important;
                border: none !important;
                padding: 10px 14px !important;
                border-radius: 10px !important;
                font-weight: 600 !important;
            }

            .btn-confirm:hover {
                background: var(--brand-dark) !important;
            }

            .empty-box {
                padding: 3rem;
                text-align: center;
                background: #f8fafc;
                border: 2px dashed var(--border);
                border-radius: var(--radius);
                color: var(--text-muted);
            }

            .step-label {
                font-size: 0.9rem;
                font-weight: 700;
                color: var(--text-main);
                margin-bottom: 1.25rem;
                display: block;
            }

            .step-label i {
                color: var(--brand);
                margin-right: 8px;
            }

            .guest-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }

            .field-wrap {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .field-wrap.full {
                grid-column: 1 / -1;
            }

            .field-wrap label {
                font-size: 0.82rem;
                font-weight: 700;
                color: var(--text-main);
            }

            .guest-helper {
                color: var(--text-muted);
                font-size: 0.85rem;
                margin-bottom: 1rem;
                line-height: 1.45;
            }

            .dialog-actions {
                display: flex;
                gap: 10px;
                margin-top: 1.25rem;
            }

            .dialog-actions .ui-button {
                width: 100%;
            }

            .wpp-inline {
                display: flex;
                align-items: center;
                gap: 8px;
                min-height: 42px;
                padding-top: 6px;
            }

            @media (max-width: 768px) {
                .premium-card {
                    padding: 1.25rem !important;
                }

                .guest-grid {
                    grid-template-columns: 1fr;
                }

                .field-wrap.full {
                    grid-column: auto;
                }

                .dialog-actions {
                    flex-direction: column;
                }
            }
        </style>

        <div class="svc-wrap">
            <h:form id="formAgendamento" styleClass="premium-card">

                <div class="header-row">
                    <div class="profile-section">
                        <div class="avatar-circle">
                            <i class="pi pi-user"></i>
                        </div>
                        <div class="titlebox">
                            <h1>#{pacienteController.colaboradorSelecionado.nome}</h1>
                            <p>Agendamento de Consulta</p>
                        </div>
                    </div>

                    <p:button href="/consulta/paciente/servicos"
                              value="Voltar"
                              icon="pi pi-chevron-left"
                              styleClass="ui-button-outlined ui-button-secondary"
                              style="border-radius: 10px;" />
                </div>

                <div class="row">
                    <div class="col-md-5 mb-4">
                        <span class="step-label">
                            <i class="pi pi-calendar-event"></i> 1. Selecione a Data
                        </span>

                        <p:calendar value="#{pacienteController.dataSelecionada}"
                                    mode="inline"
                                    mindate="today"
                                    locale="pt_BR"
                                    styleClass="cal-premium">
                            <p:ajax event="dateSelect"
                                    listener="#{pacienteController.buscarHorarios}"
                                    update="gridHorarios totalVagas" />
                        </p:calendar>
                    </div>

                    <div class="col-md-7">
                        <span class="step-label">
                            <i class="pi pi-clock"></i> 2. Horários Disponíveis
                            <h:outputText id="totalVagas"
                                          value=" (#{pacienteController.horariosDisponiveis.size()})"
                                          rendered="#{not empty pacienteController.horariosDisponiveis}"
                                          style="font-weight: normal; color: var(--text-muted);" />
                        </span>

                        <h:panelGroup id="gridHorarios" layout="block">
                            <ui:fragment rendered="#{empty pacienteController.horariosDisponiveis}">
                                <div class="empty-box">
                                    <i class="pi pi-info-circle" style="font-size: 2rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                                    <p>Selecione uma data para visualizar os horários.</p>
                                </div>
                            </ui:fragment>

                            <ui:fragment rendered="#{not empty pacienteController.horariosDisponiveis}">
                                <div class="slots-grid">
                                    <ui:repeat value="#{pacienteController.horariosDisponiveis}" var="h">
                                        <div class="time-slot" onclick="PF('confirmDialog#{h.id}').show()">
                                            <i class="pi pi-plus-circle icon-plus"></i>
                                            <span class="status-tag">Livre</span>
                                        </div>

                                        <p:dialog widgetVar="confirmDialog#{h.id}"
                                                  header="Confirmar Agendamento"
                                                  appendTo="@(body)"
                                                  modal="true"
                                                  draggable="false"
                                                  resizable="false"
                                                  width="350"
                                                  styleClass="modal-agendamento">

                                            <div style="text-align:center; padding: 1rem 0;">
                                                <p style="color: var(--text-muted); margin-bottom: 1.5rem;">
                                                    Para quem deseja agendar este horário?
                                                </p>

                                                <p:commandButton value="Para Mim"
                                                                 icon="pi pi-user"
                                                                 styleClass="btn-confirm w-100 mb-2"
                                                                 action="#{pacienteController.agendamentoParaMim(h)}"
                                                                 update="formAgendamento messages"
                                                                 oncomplete="PF('confirmDialog#{h.id}').hide()" />

                                                <p:commandButton value="Outra Pessoa"
                                                                 icon="pi pi-users"
                                                                 styleClass="ui-button-flat w-100"
                                                                 action="#{pacienteController.prepararOutraPessoa(h)}"
                                                                 process="@this"
                                                                 update=":formConvidado"
                                                                 oncomplete="PF('confirmDialog#{h.id}').hide(); PF('dialogOutraPessoa').show();" />
                                            </div>
                                        </p:dialog>
                                    </ui:repeat>
                                </div>
                            </ui:fragment>
                        </h:panelGroup>
                    </div>
                </div>

                <p:messages id="messages" closable="true" showDetail="true" style="margin-top: 2rem;" />

            </h:form>
            
            <h:form id="formConvidado">
            	<p:dialog id="dialogOutraPessoa"
			          widgetVar="dialogOutraPessoa"
			          header="Dados do Paciente"
			          modal="true"
			          draggable="false"
			          resizable="false"
			          width="620"
			          styleClass="modal-agendamento">

                    <div class="guest-helper">
                        Preencha os dados da pessoa que será atendida neste horário.
                    </div>

                    <div class="guest-grid">

                        <div class="field-wrap full">
                            <p:outputLabel for="nomeConvidado" value="Nome" />
                            <p:inputText id="nomeConvidado"
                                         value="#{pacienteController.pacienteConvidado.nome}"
                                         required="true"
                                         requiredMessage="Informe o nome do paciente convidado."
                                         style="width:100%" />
                        </div>

                        <div class="field-wrap">
                            <p:outputLabel for="cpfConvidado" value="CPF" />
                            <p:inputMask id="cpfConvidado"
                                         mask="999.999.999-99"
                                         value="#{pacienteController.pacienteConvidado.cpf}"
                                         style="width:100%" />
                        </div>

                        <div class="field-wrap">
                            <p:outputLabel for="nascimentoConvidado" value="Nascimento" />
                            <p:inputMask id="nascimentoConvidado"
                                         mask="99/99/9999"
                                         value="#{pacienteController.pacienteConvidado.nascimento}"
                                         style="width:100%" />
                        </div>

                        <div class="field-wrap">
                            <p:outputLabel for="sexoConvidado" value="Sexo" />
                            <p:selectOneMenu id="sexoConvidado"
                                             value="#{pacienteController.pacienteConvidado.sexo}"
                                             style="width:100%">
                                <f:selectItem itemLabel="Selecione" itemValue="" />
                                <f:selectItem itemLabel="Masculino" itemValue="M" />
                                <f:selectItem itemLabel="Feminino" itemValue="F" />
                            </p:selectOneMenu>
                        </div>

                        <div class="field-wrap">
                            <p:outputLabel for="telefoneConvidado" value="Telefone" />
                            <p:inputMask id="telefoneConvidado"
                                         mask="(99) 9999-9999"
                                         value="#{pacienteController.pacienteConvidado.telefone}"
                                         style="width:100%" />
                        </div>

                        <div class="field-wrap">
                            <p:outputLabel for="celularConvidado" value="Celular" />
                            <p:inputMask id="celularConvidado"
                                         mask="(99) 99999-9999"
                                         value="#{pacienteController.pacienteConvidado.celular}"
                                         style="width:100%" />
                        </div>

                        <div class="field-wrap full">
                            <p:outputLabel for="emailConvidado" value="E-mail" />
                            <p:inputText id="emailConvidado"
                                         value="#{pacienteController.pacienteConvidado.email}"
                                         style="width:100%" />
                        </div>

                        <div class="field-wrap full">
                            <label>WhatsApp</label>
                            <div class="wpp-inline">
                                <p:selectBooleanCheckbox id="wppConvidado"
                                                         value="#{pacienteController.pacienteConvidado.possuiWpp}" />
                                <p:outputLabel for="wppConvidado" value="Este número também possui WhatsApp" />
                            </div>
                        </div>

                    </div>

                    <div class="dialog-actions">
                        <p:commandButton value="Confirmar Agendamento"
						    process="formConvidado"
						    update=":formAgendamento messages"
						    action="#{pacienteController.agendar(pacienteController.horariosParaModal)}"
						    styleClass="btn-confirm"
						    oncomplete="if (!args.validationFailed) PF('dialogOutraPessoa').hide();" />

                        <p:commandButton value="Cancelar"
                                         type="button"
                                         styleClass="ui-button-secondary"
                                         onclick="PF('dialogOutraPessoa').hide();" />
                    </div>
                </p:dialog>
            </h:form>
            
        </div>

    </ui:define>
</ui:composition>
