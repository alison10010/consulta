<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    template="/view/layout/admin.xhtml">

    <ui:define name="title">Perfil</ui:define>

    <ui:define name="content">

        <!-- Leaflet (mapa clicável) -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
              integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous"/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
                integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>

        <style>
            .page{ padding:32px; display:flex; justify-content:center; }

            .form-card{
                width:100%;
                max-width:1100px;
                background:var(--card);
                border:1px solid var(--border);
                border-radius:var(--radius);
                box-shadow:var(--shadow);
                padding:28px;
            }

            .form-title{ font-weight:900; letter-spacing:-.02em; }

            .form-control{
                border-radius:14px;
                border:1px solid rgba(15,23,42,.14);
            }
            .form-control:focus{
                border-color:rgba(47,107,255,.45);
                box-shadow:0 0 0 .25rem rgba(47,107,255,.15);
            }

            .btn-primary{
                border:none;
                font-weight:800;
                border-radius:999px;
                padding:12px 18px;
                background:linear-gradient(135deg,var(--primary),var(--accent));
                box-shadow:0 14px 35px rgba(47,107,255,.22);
            }

            .map-wrap{
                border-radius:16px;
                overflow:hidden;
                border:1px solid rgba(0,0,0,.12);
                background:#fff;
            }
            #map{ width:100%; height:360px; }

            .hint{ color: rgba(15,23,42,.62); font-size: .92rem; }
            .mini{ font-size:.86rem; color: rgba(15,23,42,.62); }

            .btn-cep{
                border-radius:999px !important;
                font-weight:800;
            }
            
			.fw-bold {
			    font-weight: 500 !important;
			}
					
        </style>

        <div class="page">
        
        	<p:growl id="messages" />

            <h:form id="frm" styleClass="form-card" enctype="multipart/form-data">

                <p class="text-muted mb-4">Informações pessoais e contato</p>

                <div class="form-section mb-5">
			        <h5 class="fw-bold mb-1"><i class="bi bi-person-fill me-2 text-primary"></i>Dados Pessoais e Acesso</h5>
			        <p class="text-muted small mb-4">Informações de identificação e login no sistema.</p>
			        
			        <div class="row g-3">

					    <!-- NOME -->
					    <div class="col-md-6">
					        <label class="form-label fw-semibold">Nome Completo</label>
					        <h:inputText id="nome"
					                     value="#{colaboradorController.usuario.nome}"
					                     styleClass="form-control"
					                     placeholder="Nome completo"
					                     required="true"/>
					    </div>
					    
					     <!-- CPF -->
					    <div class="col-md-6">
					        <label class="form-label fw-semibold">CPF</label>
					        <p:inputMask id="cpf" style="border-radius: 14px;"
						             value="#{colaboradorController.usuario.cpf}"
						             mask="999.999.999-99"
						             styleClass="form-control"
						             placeholder="000.000.000-00"
						             required="true"
						             autoClear="false" />

					    </div>

					    <!-- NASCIMENTO -->
					    <div class="col-md-6">
					        <label class="form-label fw-semibold">Data de Nascimento</label>
					        <p:inputMask id="nascimento" style="border-radius: 14px;"
						             value="#{colaboradorController.usuario.nascimento}"
						             mask="99/99/9999"
						             styleClass="form-control"
						             placeholder="__/__/____"
						             required="true"
						             autoClear="false" />
					    </div>
					
					    <!-- SEXO -->
					    <div class="col-md-6">
					        <label class="form-label fw-semibold">Sexo</label>
					        <h:selectOneMenu id="sexo"
					                         value="#{colaboradorController.usuario.sexo}"
					                         styleClass="form-select"
					                         required="true">					            
					            <f:selectItem itemLabel="Masculino" itemValue="Masculino" />
					            <f:selectItem itemLabel="Feminino" itemValue="Feminino" />
					            <f:selectItem itemLabel="Prefiro não informar" itemValue="Não informado" />
					        </h:selectOneMenu>
					    </div>
					    
					</div>

			    </div>
			
			    <div class="form-section mb-5">
			        <h5 class="fw-bold mb-1"><i class="bi bi-telephone-fill me-2 text-primary"></i>Contato</h5>
			        <p class="text-muted small mb-4">Como podemos falar com o colaborador.</p>
			        
			        <div class="row g-3">
			            <div class="col-md-3">
			                <label class="form-label fw-semibold">Telefone</label>
			                <h:inputText id="telefone" value="#{colaboradorController.usuario.telefone}" styleClass="form-control" oninput="maskTelefone(this)"/>
			            </div>
			            <div class="col-md-3">
			                <label class="form-label fw-semibold">Celular</label>
			                <h:inputText id="celular" value="#{colaboradorController.usuario.celular}" styleClass="form-control" oninput="maskCelular(this)"/>
			            </div>
			            <div class="col-md-2 d-flex align-items-end">
			                <div class="form-check mb-2">
			                    <h:selectBooleanCheckbox id="possuiWpp" value="#{colaboradorController.usuario.possuiWpp}" styleClass="form-check-input"/>
			                    <label class="form-check-label small fw-bold">Possui WhatsApp</label>
			                </div>
			            </div>
			        </div>
			    </div>
						    
            <div class="d-flex justify-content-end gap-2">
	  
			    <!-- Botão Cancelar -->
			    <button type="reset"
			            class="btn btn-outline-premium btn-pill"
			            onclick="limparMarcador();">
			        <i class="bi bi-x-lg me-2"></i>Cancelar
			    </button>
			
			    <!-- Botão Salvar -->
			   <p:commandButton value="Salvar"
	                 icon="bi bi-check-lg"
	                 styleClass="btn-premium"
	                 action="#{colaboradorController.salvar}"
	                 update="@form, messages"/>
	
			</div>

          </h:form>
      </div>
        

    </ui:define>
</ui:composition>
