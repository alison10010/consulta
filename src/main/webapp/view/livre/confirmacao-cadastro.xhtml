<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://java.sun.com/jsp/jstl/core">

<h:head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" type="image/png" href="/consulta/img/fevicon.png" />

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

	<link rel="stylesheet" href="/consulta/css/mensagemSalvo.css" />

</h:head>

<h:body>

	<script src="/consulta/bootstrap/sweetalert.min.js"></script>
	<script>
	//<![CDATA[
      function showStatus(status){
        const redirectLogin = function(){ window.location.href = '/consulta/'; };
        const redirectHome  = function(){ window.location.href = '/consulta/'; };

        switch(status){
          case 'SUCESSO':
            swal({ title:"Confirmado com sucesso!", text:"Agora você já pode fazer login.", type:"success", confirmButtonText:"OK" }, redirectLogin);
            break;

          case 'JA_CONFIRMADO':
            swal({ title:"Já confirmado!", text:"Sua conta já estava confirmada. Pode fazer login.", type:"info", confirmButtonText:"Ir para login" }, redirectLogin);
            break;

          case 'HASH_INVALIDO':
            swal({ title:"Link inválido", text:"O link de confirmação não é válido. Solicite um novo.", type:"error", confirmButtonText:"OK" }, redirectLogin);
            break;

          case 'EXPIRADO':
            swal({ title:"Link expirado", text:"Esse link expirou. Solicite um novo e-mail.", type:"warning", confirmButtonText:"OK" }, redirectLogin);
            break;

          case 'FALHA':
          default:
            swal({ title:"Falha ao confirmar", text:"Tente novamente em alguns instantes.", type:"error", confirmButtonText:"OK" }, redirectHome);
            break;
        }
      }

      window.addEventListener('load', function(){
        // pega ?status=...
        const params = new URLSearchParams(window.location.search);
        const status = (params.get('status') || 'FALHA').toUpperCase();
        showStatus(status);
      });
      
      //]]>
      
    </script>

</h:body>
</html>
