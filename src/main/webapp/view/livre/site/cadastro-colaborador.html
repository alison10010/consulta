<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro | Consulta Médica</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --surface: #ffffff;
      --bg: #f9fafb;
      --border: #e5e7eb;
      --text-main: #111827;
      --text-muted: #6b7280;
      --radius-lg: 16px;
      --radius-md: 10px;
    }

    body {
      background:
        radial-gradient(1200px 600px at 10% 5%, rgba(43,108,255,.14), transparent 55%),
        radial-gradient(1000px 520px at 90% 15%, rgba(122,92,255,.14), transparent 55%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 15px;
    }

    .main-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 850px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .card-header {
      padding: 32px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .icon-box {
      width: 44px;
      height: 44px;
      background: #eef2ff;
      color: var(--primary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary);
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: "";
      height: 1px;
      background: var(--border);
      flex-grow: 1;
    }

    .form-label {
      font-weight: 600;
      font-size: 0.875rem;
      margin-bottom: 6px;
    }

    .form-control, .form-select {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 0.95rem;
      transition: all 0.2s;
      background-color: #fcfcfd;
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      background-color: #fff;
    }

    .btn-save {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 12px 24px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-save:hover {
      background-color: var(--primary-hover);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
    }

    .btn-cancel {
      color: var(--text-muted);
      font-weight: 600;
      text-decoration: none;
      padding: 12px 24px;
    }

    .help-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    @media (max-width: 576px) {
      .card-header { padding: 20px; }
      #formCadastro { padding: 20px !important; }
    }

    .p-5 {
      padding: 0rem 3rem 2rem 3rem !important;
  }

  /* Estilos para a nova Navbar */
  .navbar {
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
    width: 100%;
    position: fixed; /* Mantém o menu no topo */
    top: 0;
    left: 0;
    z-index: 1000;
  }
  .btn-nav-hover:hover {
    background: rgba(79, 70, 229, 0.05);
    color: var(--primary) !important;
  }
  /* Ajuste no body para não cobrir o conteúdo pelo menu fixo */
  body {
    padding-top: 100px !important; 
  }
  </style>
</head>
<body>

  <nav class="navbar sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand" href="index.html">
        <img src="logo.png" class="brand-logo-inline" alt="Logo" style="height: 45px; transition: transform 0.3s ease;"/>
      </a>

      <div class="d-flex align-items-center gap-2">
        <a href="index.html" class="btn btn-link text-decoration-none fw-bold text-dark px-3 rounded-pill btn-nav-hover">
          Home
        </a>
        <a href="/consulta/" class="btn btn-link text-decoration-none fw-bold text-dark px-3 rounded-pill btn-nav-hover">
          Acessar
        </a>
        <a href="cadastro-painel.html" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold">
          Cadastrar
        </a>
      </div>
    </div>
</nav>

  <div class="main-card">
    <div class="card-header">
      <div class="d-flex align-items-center gap-3">
        <div class="icon-box"><i class="bi bi-person-badge"></i></div>
        <div>
          <h4 class="mb-0 fw-bold" style="letter-spacing: -0.02em;">Cadastro de Colaborador</h4>
          <p class="mb-0 text-muted small">Preencha as informações para o novo acesso.</p>
        </div>
      </div>
    </div>

    <form id="formCadastro" class="p-5" autocomplete="off" enctype="multipart/form-data">
      <div id="alertBox" class="alert d-none py-3 mb-4" role="alert"></div>

      <div class="section-label">Credenciais de Acesso</div>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nome Completo</label>
          <input type="text" id="nome" class="form-control" placeholder="Digite o nome completo" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">E-mail</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-at"></i></span>
            <input type="email" id="username" class="form-control border-start-0" placeholder="email@exemplo.com" required>
          </div>
          <div id="usernameHint" class="help-text">Usado para entrar no sistema.</div>
        </div>
        <div class="col-md-6">
          <label class="form-label">CPF</label>
          <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Nascimento</label>
          <input type="text" id="nascimento" class="form-control" placeholder="__/__/____" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Sexo</label>
          <select id="sexo" class="form-select" required>
            <option value="">Selecione</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
            <option value="Não informado">Prefiro não informar</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Telefone / WhatsApp</label>
          <input type="text" id="telefone" class="form-control" placeholder="(00) 00000-0000">
        </div>
      </div>

      <div class="section-label">Endereço</div>
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">CEP</label>
          <div class="input-group">
            <input type="text" id="cep" class="form-control" placeholder="00000-000" maxlength="9">
            <button class="btn btn-outline-primary" type="button" id="btnPesquisarCep">
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>
        <div class="col-md-7">
          <label class="form-label">Logradouro</label>
          <input type="text" id="endereco" class="form-control" placeholder="Rua, Avenida...">
        </div>
        <div class="col-md-2">
          <label class="form-label">Nº</label>
          <input type="text" id="numero" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">Bairro</label>
          <input type="text" id="bairro" class="form-control">
        </div>
        <div class="col-md-5">
          <label class="form-label">Cidade</label>
          <input type="text" id="cidade" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">UF</label>
          <select id="uf" class="form-select" required>
            <option value="">Selecione</option>
            <option value="AC">AC</option><option value="AL">AL</option><option value="AP">AP</option><option value="AM">AM</option>
            <option value="BA">BA</option><option value="CE">CE</option><option value="DF">DF</option><option value="ES">ES</option>
            <option value="GO">GO</option><option value="MA">MA</option><option value="MT">MT</option><option value="MS">MS</option>
            <option value="MG">MG</option><option value="PA">PA</option><option value="PB">PB</option><option value="PR">PR</option>
            <option value="PE">PE</option><option value="PI">PI</option><option value="RJ">RJ</option><option value="RN">RN</option>
            <option value="RS">RS</option><option value="RO">RO</option><option value="RR">RR</option><option value="SC">SC</option>
            <option value="SP">SP</option><option value="SE">SE</option><option value="TO">TO</option>
          </select>
        </div>
      </div>

      <div class="section-label">Dados Profissionais</div>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Especialidade</label>
          <select id="especialidade" class="form-select" required>
            <option value="">Selecione a especialidade</option>
          </select>

        </div>
        <div class="col-md-3">
          <label class="form-label">Conselho</label>
          <select id="conselho" class="form-select" required>
            <option value="">Selecione</option>
            <option value="CRM">CRM</option>
            <option value="CRP">CRP</option>
            <option value="CRO">CRO</option>
            <option value="COREN">COREN</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Registro</label>
          <input type="text" id="registro" class="form-control" placeholder="000000" required>
        </div>
      </div>
      <br />
      <!-- ===== DOCUMENTOS (ANEXAR) ===== -->
      <div class="row g-3 mb-4">
        <div class="col-md-6">
            <label class="form-label">* Diploma de Graduação (PDF/IMG)</label>
            <input type="file" id="arquivoDiploma" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">* Carteira do Conselho (PDF/IMG)</label>
            <input type="file" id="arquivoConselho" class="form-control" required>
        </div>
      </div>

      <div class="section-label">Segurança</div>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Criar Senha</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
            <button class="btn btn-outline-secondary"
                  type="button"
                  onclick="togglePassword('password', this)"
                  aria-label="Mostrar senha">
            <i class="bi bi-eye"></i>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Confirmar Senha</label>
          <div class="input-group">
            <input type="password" id="confirmPassword" class="form-control" required>
            <button class="btn btn-outline-secondary"
              type="button"
              onclick="togglePassword('confirmPassword', this)"
              aria-label="Mostrar senha">
              <i class="bi bi-eye"></i>
          </div>
        </div>
      </div>

      <div class="mt-4 p-3 rounded-3 border bg-light">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="termo" required>
          <label class="form-check-label small fw-medium text-dark" for="termo">
            Li e aceito os 
            <a href="colaborador-termos.html" target="_blank" class="text-primary text-decoration-none fw-bold">termos de uso</a> 
            e a 
            <a href="colaborador-privacidade.html" target="_blank" class="text-primary text-decoration-none fw-bold">política de privacidade</a>.
          </label>
        </div>
      </div>

      <div class="d-flex flex-column flex-md-row justify-content-end align-items-center gap-3 mt-5">
        <a href="#" class="btn-cancel" onclick="history.back()">Cancelar</a>
        <button type="submit" id="btnCadastrar" class="btn-save w-100 w-md-auto">
          <i class="bi bi-check2-circle me-2"></i>Finalizar Cadastro
        </button>
      </div>

    </form>
  </div>

  <script>
    const API_BASE = "/consulta/api/";
    //const API_BASE = "http://localhost:8080/consulta/api/";
    const alertBox = document.getElementById("alertBox");

    // Helper de Alerta
    function showAlert(type, msg) {
        alertBox.className = `alert alert-${type} d-block`;
        alertBox.textContent = msg;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function carregarEspecialidades(){
      const select = document.getElementById("especialidade");
      try {
        const res = await fetch(`${API_BASE}especialidades`);
        if (!res.ok) throw new Error("Falha ao carregar especialidades");

        const lista = await res.json();

        // limpa e coloca o placeholder
        select.innerHTML = `<option value="">Selecione a especialidade</option>`;

        // se você retornar entidade, os campos serão (provavelmente) id e especialidade
        lista.forEach(e => {
          const opt = document.createElement("option");
          opt.value = e.id;                 // <<< AQUI VAI O ID
          opt.textContent = e.especialidade; // texto bonitinho
          select.appendChild(opt);
        });
      } catch (err) {
        console.error(err);
        // se quiser, mostra alerta
        // showAlert("danger", "Não foi possível carregar especialidades.");
      }
    }

    carregarEspecialidades();


    // --- VALIDAÇÃO DE USERNAME (DEBOUNCE) ---
    let userDebounce;
    document.getElementById("username").addEventListener("input", (e) => {
        clearTimeout(userDebounce);
        const hint = document.getElementById("usernameHint");
        const user = e.target.value.trim();
        
        if(user.length < 3) return;

        userDebounce = setTimeout(async () => {
            try {
                const res = await fetch(`${API_BASE}usuario/existente?username=${encodeURIComponent(user)}`, { method: "POST" });
                const exists = await res.json();
                hint.className = exists ? "help-text text-danger fw-bold" : "help-text text-success fw-bold";
                hint.textContent = exists ? "✕ Este usuário já está em uso" : "✓ Usuário disponível";
            } catch (e) { console.error("Falha ao checar usuário"); }
        }, 500);
    });

    // --- PESQUISA DE CEP ---
    document.getElementById("btnPesquisarCep").addEventListener("click", async () => {
        const cep = document.getElementById("cep").value.replace(/\D/g, '');
        const btn = document.getElementById("btnPesquisarCep");

        if (cep.length !== 8) {
            showAlert("warning", "Por favor, digite um CEP válido com 8 dígitos.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span>`;

        try {
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();

            if (data.erro) {
                showAlert("danger", "CEP não encontrado.");
            } else {
                document.getElementById("endereco").value = data.logradouro;
                document.getElementById("bairro").value = data.bairro;
                document.getElementById("cidade").value = data.localidade;
                document.getElementById("uf").value = data.uf;
                document.getElementById("numero").focus();
                alertBox.classList.add("d-none");
            }
        } catch (error) {
            showAlert("danger", "Erro ao buscar o CEP.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="bi bi-search"></i>`;
        }
    });

    // --- ENVIO DO FORMULÁRIO (MULTIPART) ---
    document.getElementById("formCadastro").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const pass = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;

        // Validações Básicas
        if (pass !== confirm) return showAlert("danger", "As senhas não coincidem.");
        if (pass.length < 8) return showAlert("danger", "A senha deve ter no mínimo 8 caracteres.");

        // Validação de Arquivos
        const fileDiploma = document.getElementById("arquivoDiploma").files[0];
        const fileConselho = document.getElementById("arquivoConselho").files[0];

        if (!fileDiploma || !fileConselho) {
            return showAlert("warning", "É obrigatório anexar o Diploma e a Carteira do Conselho.");
        }

        const btn = document.getElementById("btnCadastrar");
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Processando Cadastro...`;

        // 1. Criar o objeto de dados (DTO)
        const usuarioDados = {
            nome: document.getElementById("nome").value,
            username: document.getElementById("username").value,
            email: document.getElementById("username").value,
            cpf: document.getElementById("cpf").value,
            sexo: document.getElementById("sexo").value,
            nascimento: document.getElementById("nascimento").value,
            password: pass,
            telefone: document.getElementById("telefone").value,
            cep: document.getElementById("cep").value,
            endereco: document.getElementById("endereco").value,
            numero: document.getElementById("numero").value,
            bairro: document.getElementById("bairro").value,
            cidade: document.getElementById("cidade").value,
            uf: document.getElementById("uf").value,
            especialidade: document.getElementById("especialidade").value,
            conselho: document.getElementById("conselho").value,
            registro: document.getElementById("registro").value,
            acesso: "COLABORADOR",
            termoAceite: document.getElementById("termo").checked
        };

        // 2. Montar o FormData (Para enviar Arquivos + JSON)
        const formData = new FormData();
        formData.append("diploma", fileDiploma);
        formData.append("carteira", fileConselho);
        
        // O Spring Boot espera o DTO como uma parte do Multipart
        formData.append("dto", new Blob([JSON.stringify(usuarioDados)], {
            type: "application/json"
        }));

        try {
            const response = await fetch(`${API_BASE}usuario/add`, {
                method: "POST",
                body: formData // Nota: Não enviamos Headers de Content-Type aqui
            });

           if (response.status === 201 || response.status === 200) {
              showAlert("success", "Cadastrado com sucesso!");

              setTimeout(() => {
                window.location.href = "/consulta/home";
              }, 2000);
            } else {
                const msg = await response.text();
                showAlert("danger", msg || "Erro ao processar cadastro.");
            }
        } catch (err) {
            showAlert("danger", "Falha de comunicação com o servidor.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="bi bi-check2-circle me-2"></i>Finalizar Cadastro`;
        }
    });

    // Enter no CEP aciona busca
    document.getElementById("cep").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            document.getElementById("btnPesquisarCep").click();
        }
    });
</script>

<script src="js/jquery-3.6.0.min.js" type="text/javascript" charset="utf-8"></script>
<script src="js/jquery.maskedinput.js" type="text/javascript"></script>

<script type="text/javascript">
    /* Mascaras desejadas pelo ID */
    $(function() {
        $("#nascimento").mask("99/99/9999");
        $("#cpf").mask("999.999.999-99");
    });
</script>

<script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon  = btn.querySelector('i');

      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    }
</script>

</body>
</html>
