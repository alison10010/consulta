<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resultados | Consulta Médica</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root {
      --brand: #2b6cff;
      --brand-soft: rgba(43, 108, 255, 0.1);
      --brand-2: #7a5cff;
      --ink: #0f172a;
      --muted: #64748b;
      --bg: #f8fafc;
      --white: #ffffff;
      --stroke: rgba(15, 23, 42, 0.08);
      --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --radius: 24px;
      --radius-sm: 16px;
    }

    * {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      color: var(--ink);
      background:
        radial-gradient(at 0% 0%, rgba(43,108,255,0.06) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(122,92,255,0.06) 0px, transparent 50%),
        var(--bg);
      min-height: 100vh;
    }

    /* Navbar Flutuante */
    .navbar {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.8);
      border-bottom: 1px solid var(--stroke);
      padding: 0.8rem 0;
    }

    .brand-logo-inline { height: 45px; transition: transform 0.3s ease; }

    /* Container Principal Estilo Vidro */
    .main-glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2.5rem;
      margin-top: 2rem;
    }

    /* Estilização dos Inputs */
    .form-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .form-control, .form-select {
      border: 1px solid var(--stroke);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      background: var(--white);
      transition: all 0.2s;
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--brand-soft);
    }

    /* Card do Profissional */
    .professional-card {
      background: var(--white);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      padding: 1.5rem;
      height: 100%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .professional-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 30px rgba(15, 23, 42, 0.08);
      border-color: var(--brand);
    }

    .prof-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .avatar-placeholder {
      width: 50px; height: 50px;
      background: var(--brand-soft);
      color: var(--brand);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }

    .location-tag {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--brand);
      background: var(--brand-soft);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* Agenda Estilizada */
    .horarios-container {
      background: #f8fafc;
      border-radius: 12px;
      padding: 8px;
      margin-top: 10px;
      border: 1px solid var(--stroke);
    }

    .day-card {
      background: #fff;
      border: 1px solid var(--stroke);
      border-radius: 10px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .day-head {
      width: 100%;
      padding: 10px 12px;
      background: none;
      border: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      font-weight: 700;
      color: #0f172a;
    }

    .day-head .meta {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .day-body {
      display: none;
      padding: 10px;
      border-top: 1px solid var(--stroke);
    }

    .day-card.open .day-body { display: block; }

    .mini-pill {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: #fff;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* Botões */
    .btn-primary-modern {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white; border: none;
      padding: 12px 25px; border-radius: 14px;
      font-weight: 600; transition: 0.3s;
    }

    .btn-primary-modern:hover {
      color: white;
      box-shadow: 0 10px 20px rgba(43, 108, 255, 0.2);
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-action-outline {
      border: 1px solid var(--stroke);
      background: white;
      border-radius: 12px;
      padding: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      transition: 0.2s;
    }

    .btn-action-outline:hover {
      border-color: var(--brand);
      color: var(--brand);
    }

    .service-item {
      display: flex; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px dashed var(--stroke);
    }
    .service-item:last-child { border: none; }

    /* Navbar Estilizada */
    .btn-nav-hover:hover {
      background: rgba(79, 70, 229, 0.05);
      color: var(--brand) !important;
    }
  </style>
</head>

<body>

  <nav class="navbar sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand" href="index.html">
        <img src="logo.png" class="brand-logo-inline" alt="Logo"/>
      </a>

      <div class="d-flex align-items-center gap-2">
        <a href="index.html" class="btn btn-link text-decoration-none fw-bold text-dark px-3 rounded-pill btn-nav-hover">
          Home
        </a>
        <a href="/consulta/" class="btn btn-link text-decoration-none fw-bold text-dark px-3 rounded-pill btn-nav-hover">
          Acessar
        </a>
        <a href="cadastro-painel.html" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold">
          Cadastrar
        </a>
      </div>
    </div>
  </nav>

  <main class="container mb-5">
    <div class="main-glass-card">
      <div class="row align-items-center mb-4">
        <div class="col-md-8">
          <h1 class="h3 fw-bold mb-1">Encontre seu Especialista</h1>
          <p class="text-muted small mb-0">Explore profissionais qualificados e agende sua consulta em minutos.</p>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
          <span id="badgeResumo" class="badge rounded-pill bg-white text-dark border p-2 px-3 shadow-sm">
            <i class="bi bi-funnel me-1"></i> Pronto para buscar
          </span>
        </div>
      </div>

      <div class="row g-3 p-3 bg-white rounded-4 border shadow-sm mb-4">
        <div class="col-md-4">
          <label class="form-label">Especialidade</label>
          <select id="especialidadeSelect" class="form-select"></select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Estado (UF)</label>
          <select id="stateSelect" class="form-select"></select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Cidade</label>
          <select id="citySelect" class="form-select"></select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button id="btnSearch" class="btn btn-primary-modern w-100">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h5 fw-bold mb-0">Resultados <span id="resultCount" class="badge bg-primary ms-2">0</span></h2>
        <a href="index.html" class="btn btn-sm text-muted fw-bold text-decoration-none">
          <i class="bi bi-arrow-left"></i> Voltar
        </a>
      </div>

      <div id="results" class="row g-4"></div>

      <div class="mt-5 p-4 rounded-4 border-0 shadow-sm" style="background: linear-gradient(90deg, #f8fafc, #eff6ff);">
        <div class="row align-items-center">
          <div class="col-md-9">
            <h4 class="h6 fw-bold mb-2">Você é um profissional da saúde?</h4>
            <p class="small text-muted mb-md-0">Junte-se à nossa rede e facilite o agendamento para seus pacientes.</p>
          </div>
          <div class="col-md-3 text-md-end">
            <a href="cadastro-painel.html" class="btn btn-dark btn-sm rounded-3 px-4">Cadastrar-se</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
(function(){
  const API_BASE = "/consulta/api";
  //const API_BASE = "http://localhost:8080/consulta/api";

  var espSelect   = document.getElementById("especialidadeSelect");
  var stateSelect = document.getElementById("stateSelect");
  var citySelect  = document.getElementById("citySelect");
  var btnSearch   = document.getElementById("btnSearch");
  var badgeResumo = document.getElementById("badgeResumo");
  var resultCount = document.getElementById("resultCount");
  var results     = document.getElementById("results");

  var COLABORADORES = [];

  function esc(s){
    return s == null ? "" : String(s).replace(/[&<>"']/g, function(m){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m];
    });
  }
  function normalize(s){
    return (s || "").toString().trim().toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  }
  function formatMoeda(v){
    var n = Number(v);
    if (!isFinite(n)) return "";
    try { return n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
    catch(e){ return "R$ " + n.toFixed(2).replace(".", ","); }
  }
  async function fetchJson(url){
    var r = await fetch(url, { headers: { "Accept": "application/json" }});
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  }
  function formatDataBR(iso){
    if (!iso) return "";
    var p = String(iso).split("-");
    return (p.length===3) ? (p[2]+"/"+p[1]+"/"+p[0]) : iso;
  }

  // ✅ NOVO: agora itens = [{data, vagas, janela}]
  function renderAgenda(itens){
    if(!Array.isArray(itens) || !itens.length){
      return '<div class="text-center small text-muted">Sem disponibilidade</div>';
    }

    // ordena por data (YYYY-MM-DD já ordena como string)
    itens = itens.slice().sort(function(a,b){
      return String((a && a.data) || "").localeCompare(String((b && b.data) || ""));
    });

    var html = "";
    itens.forEach(function(x){
      if(!x || !x.data) return;

      var data = x.data;
      var vagas = Number(x.vagas || 0);
      var janela = x.janela || "—";

      html += ''
        + '<div class="day-card">'
        + '  <button type="button" class="day-head">'
        + '    <span>' + esc(formatDataBR(data)) + '</span>'
        + '    <span class="meta">'
        +        esc(vagas) + ' vagas • ' + esc(janela)
        + '      <i class="bi bi-chevron-down ms-1"></i>'
        + '    </span>'
        + '  </button>'
        + '  <div class="day-body">'
        + '    <div class="d-flex flex-wrap gap-2">'
        + '      <span class="mini-pill"><i class="bi bi-people-fill"></i> ' + esc(vagas) + ' vagas disponíveis</span>'
        + '      <span class="mini-pill"><i class="bi bi-clock-fill"></i> ' + esc(janela) + '</span>'
        + '    </div>'
        + '    <div class="small text-muted mt-2">'
        + '      Para agendar, selecione a especialidade e clique em <b>Agendar</b>.'
        + '    </div>'
        + '  </div>'
        + '</div>';
    });

    return html;
  }

  window.__toggleHorarios = async function(colabId){
    var el = document.getElementById("horarios_" + colabId);
    if (!el) return;

    if (el.style.display === "block"){
      el.style.display = "none";
      return;
    }

    el.style.display = "block";

    if (!el.dataset.loaded){
      el.dataset.loaded = "1";
      el.innerHTML = '<div class="text-center py-2"><div class="spinner-border spinner-border-sm text-primary"></div></div>';

      try{
        // ✅ agora endpoint devolve [{data, vagas, janela}]
        var dados = await fetchJson(API_BASE + "/colaboradores/" + colabId + "/horarios-disponiveis");
        el.innerHTML = renderAgenda(dados);

        // accordion
        var heads = el.querySelectorAll(".day-head");
        for (var i=0;i<heads.length;i++){
          heads[i].onclick = function(){
            var card = this.closest(".day-card");
            if (card) card.classList.toggle("open");
          };
        }
      } catch(err){
        console.error(err);
        el.innerHTML = '<div class="text-center small text-danger">Erro ao carregar disponibilidade</div>';
      }
    }
  };

  function cardColaborador(c, espFiltro){
    var espParaEnviar = null;
    if (espFiltro){
      espParaEnviar = (c.especialidades || []).find(function(es){
        return normalize(es && es.nome) === normalize(espFiltro);
      }) || null;
    }

    var horariosId = "horarios_" + c.id;

    var servicesHtml = (c.especialidades || []).map(function(es){
      if (!es || !es.nome) return "";
      var isSelected = espFiltro && normalize(es.nome) === normalize(espFiltro);

      var vNormal = (es.valor != null) ? formatMoeda(es.valor) : "—";
      var vGuia = (es.valorComGuia != null) ? formatMoeda(es.valorComGuia) : "—";
      var infoRegistro = (es.conselho && es.registro) ? esc(es.conselho) + " - " + esc(es.registro) : "";

      return ''
        + '<div class="service-item flex-column align-items-start gap-1 py-2" style="border-bottom: 1px solid #f1f5f9;">'
        + '  <div class="d-flex justify-content-between align-items-start w-100">'
        + '    <div class="' + (isSelected ? 'fw-bold text-primary' : 'fw-semibold text-dark') + '" style="font-size:0.8rem;">'
        +         esc(es.nome)
        + '    </div>'
        + '    <span class="badge text-secondary border" style="font-size:0.6rem; background: #f8fafc;">'
        +         infoRegistro
        + '    </span>'
        + '  </div>'
        + '  <div class="d-flex w-100 justify-content-between align-items-center">'
        + '    <span class="text-muted" style="font-size:0.7rem;">Particular: <strong>' + esc(vNormal) + '</strong></span>'
        + '    <span class="badge" style="font-size:0.65rem; background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0;">'
        + '      COM GUIA: <strong>' + esc(vGuia) + '</strong>'
        + '    </span>'
        + '  </div>'
        + '</div>';
    }).join("");

    return ''
      + '<div class="col-md-6 col-lg-4">'
      + '  <div class="professional-card">'
      + '    <div class="prof-header">'
      + '      <div class="avatar-placeholder"><i class="bi bi-person-fill"></i></div>'
      + '      <span class="location-tag">' + esc(c.cidade || "—") + '</span>'
      + '    </div>'
      + '    <h3 class="h6 fw-bold mb-1">' + esc(c.nome || "Profissional") + '</h3>'
      + '    <div class="flex-grow-1 my-3">'
      + '      <div class="fw-bold mb-2" style="font-size:0.65rem;color:#94a3b8;text-transform:uppercase; letter-spacing:0.5px;">Especialidade e Valores</div>'
      +        (servicesHtml || '<div class="small text-muted">Sem especialidades</div>')
      + '      <div class="mt-3 p-2 rounded-3" style="background-color: #fefce8; border: 1px dashed #fef08a;">'
      + '        <p class="mb-0 text-center" style="font-size: 0.65rem; color: #854d0e; font-weight: 500;">'
      + '          <i class="bi bi-info-circle-fill me-1"></i> O valor da consulta deve ser pago diretamente ao médico no ato do atendimento.'
      + '        </p>'
      + '        <p class="mb-1 text-center" style="font-size: 0.65rem; color: #854d0e; font-weight: 700;">'
      + '          <i class="bi bi-ticket-perforated-fill me-1"></i> Valor da Guia: R$ 20,00'
      + '        </p>'
      + '      </div>'
      + '    </div>'
      + '    <div class="mt-auto">'
      + '      <button class="btn btn-action-outline w-100 mb-2" type="button" onclick="window.__toggleHorarios(' + Number(c.id) + ')">'
      + '        <i class="bi bi-calendar3 me-2"></i>Disponibilidade'
      + '      </button>'
      + '      <div id="' + horariosId + '" style="display:none;" class="horarios-container"></div>'
      +      (
              espParaEnviar
              ? '<form action="/consulta/paciente/agendamento" method="POST" class="m-0 w-100 mt-2">'
                  + '<input type="hidden" name="id" value="' + esc(c.id) + '"/>'
                  + '<input type="hidden" name="especialidade" value="' + esc(espParaEnviar.nome) + '"/>'
                  + '<input type="hidden" name="valor" value="' + esc(espParaEnviar.valor) + '"/>'
                  + '<input type="hidden" name="valorComGuia" value="' + esc(espParaEnviar.valorComGuia) + '"/>'
                  + '<button type="submit" class="btn btn-primary-modern w-100">Agendar Consulta</button>'
                + '</form>'
              : '<div class="alert alert-warning py-2 mt-2 mb-0 text-center" style="font-size:0.7rem; border-radius:8px;">Selecione especialidade para agendar</div>'
          )
      + '    </div>'
      + '  </div>'
      + '</div>';
  }

  function preencherEspecialidades(especialidadeSel){
    var set = new Set();
    COLABORADORES.forEach(function(c){
      (c.especialidades || []).forEach(function(es){
        if (es && es.nome) set.add(String(es.nome));
      });
    });
    var esps = Array.from(set).sort(function(a,b){ return String(a).localeCompare(String(b),"pt-BR"); });

    espSelect.innerHTML = '<option value="">Qualquer especialidade</option>'
      + esps.map(function(e){
          var sel = (especialidadeSel && normalize(e) === normalize(especialidadeSel)) ? ' selected' : '';
          return '<option value="' + esc(e) + '"' + sel + '>' + esc(e) + '</option>';
        }).join("");
  }

  function preencherEstados(ufSel){
    var set = new Set();
    COLABORADORES.forEach(function(c){ if (c.estado) set.add(String(c.estado)); });
    var ufs = Array.from(set).sort();

    stateSelect.innerHTML = '<option value="">Estado</option>'
      + ufs.map(function(uf){
          var sel = (ufSel && uf === ufSel) ? ' selected' : '';
          return '<option value="' + esc(uf) + '"' + sel + '>' + esc(uf) + '</option>';
        }).join("");
  }

  function preencherCidades(uf, cidadeSel){
    citySelect.innerHTML = '<option value="">Cidade</option>';
    citySelect.disabled = !uf;

    if (!uf) return;

    var set = new Set();
    COLABORADORES.forEach(function(c){
      if (c.estado === uf && c.cidade) set.add(String(c.cidade));
    });

    var cidades = Array.from(set).sort(function(a,b){ return String(a).localeCompare(String(b),"pt-BR"); });

    citySelect.innerHTML = '<option value="">Cidade</option>'
      + cidades.map(function(cid){
          var sel = (cidadeSel && cid === cidadeSel) ? ' selected' : '';
          return '<option value="' + esc(cid) + '"' + sel + '>' + esc(cid) + '</option>';
        }).join("");
  }

  function atualizarBadge(esp, uf, cid){
    var parts = [];
    if (esp) parts.push(esp);
    if (uf) parts.push(uf);
    if (cid) parts.push(cid);
    badgeResumo.innerHTML = '<i class="bi bi-check-circle"></i> ' + (parts.length ? parts.map(esc).join(" • ") : "Geral");
  }

  function filtrarERenderizar(opts){
    opts = opts || {};
    var esp = (espSelect && espSelect.value) ? espSelect.value : "";
    var uf  = (stateSelect && stateSelect.value) ? stateSelect.value : "";
    var cid = (!citySelect.disabled && citySelect.value) ? citySelect.value : "";

    var filtrados = COLABORADORES.filter(function(c){
      var matchEsp = !esp || (c.especialidades || []).some(function(e){
        return normalize(e && e.nome) === normalize(esp);
      });
      var matchUf  = !uf || c.estado === uf;
      var matchCid = !cid || c.cidade === cid;
      return matchEsp && matchUf && matchCid;
    });

    results.innerHTML = filtrados.map(function(c){ return cardColaborador(c, esp); }).join("");
    resultCount.textContent = String(filtrados.length);
    atualizarBadge(esp, uf, cid);
  }

  function applyUrlFilters(){
    var params = new URLSearchParams(location.search);
    var ufIni  = params.get("uf") || "";
    var munIni = params.get("municipio") || "";
    var espIni = params.get("especialidade") || "";

    preencherEstados(ufIni);
    preencherCidades(ufIni, munIni);
    preencherEspecialidades(espIni);

    if (ufIni) stateSelect.value = ufIni;
    if (munIni) citySelect.value = munIni;
    if (espIni) espSelect.value = espIni;

    filtrarERenderizar({ silent: true });
  }

  async function init(){
    try{
      var colaboradores = await fetchJson(API_BASE + "/colaboradores");
      COLABORADORES = Array.isArray(colaboradores) ? colaboradores : [];

      applyUrlFilters();

      btnSearch.onclick = function(e){
        if (e) e.preventDefault();
        filtrarERenderizar({ silent: false });
      };

      stateSelect.onchange = function(){
        preencherCidades(stateSelect.value, "");
      };

    } catch(err){
      console.error(err);
      results.innerHTML = '<div class="col-12 text-center p-4">Erro ao carregar dados da API.</div>';
    }
  }

  init();
})();
</script>

</body>
</html>
