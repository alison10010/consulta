<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/consulta/img/fevicon.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <title>Recuperar Senha</title>

  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --primary: #2F6BFF;
      --accent: #7C3AED;
      --glass: rgba(255, 255, 255, 0.9);
      --radius: 20px;
    }

    body {
      min-height: 100vh;
      background: 
        radial-gradient(at 0% 0%, rgba(47,107,255,0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(124,58,237,0.1) 0px, transparent 50%),
        #F7F9FC;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: 'Inter', sans-serif;
    }

    .recover-card {
      width: 100%;
      max-width: 400px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      padding: 2.5rem;
      animation: fadeUp 0.5s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      border-radius: 16px;
      margin: 0 auto 1.5rem;
      box-shadow: 0 10px 20px rgba(47,107,255,0.2);
    }

    .form-label { font-weight: 600; font-size: 0.85rem; color: #475569; }

    .input-group-custom {
      position: relative;
    }

    .input-group-custom i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      z-index: 10;
    }

    .form-control {
      height: 50px;
      padding-left: 45px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(47,107,255,0.1);
    }

    .btn-submit {
      height: 50px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      font-weight: 600;
      transition: transform 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 15px rgba(47,107,255,0.3);
    }

    .btn-submit:active { transform: translateY(0); }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-right: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="recover-card">
  <div class="brand-icon">
    <i class="bi bi-shield-lock"></i>
  </div>
  
  <h4 class="text-center fw-bold mb-2">Recuperar Senha</h4>
  <p class="text-center text-muted small mb-4">
    Enviaremos instruções para o seu e-mail de cadastro.
  </p>

  <div id="alertBox" class="alert d-none small" role="alert"></div>

  <form id="frmRecuperar" onsubmit="enviarRecuperacao(event)">
    <div class="mb-4">
      <label class="form-label">E-mail de Acesso</label>
      <div class="input-group-custom">
        <i class="bi bi-envelope"></i>
        <input type="email" id="email" class="form-control" placeholder="exemplo@email.com" />
      </div>
    </div>

    <button type="submit" id="btnSubmit" class="btn btn-primary w-100 btn-submit d-flex align-items-center justify-content-center">
      <span id="btnLoader" class="loader"></span>
      <span id="btnText">Enviar Senha Provisória</span>
    </button>
  </form>

  <div class="text-center mt-4">
    <a href="/consulta/login" class="text-decoration-none small fw-bold" style="color: var(--primary)">
      <i class="bi bi-arrow-left me-1"></i> Voltar para o login
    </a>
  </div>
</div>

<script>
async function enviarRecuperacao(event) {
  event.preventDefault(); // Impede o reload da página
  
  const emailEl = document.getElementById("email");
  const alertBox = document.getElementById("alertBox");
  const btnSubmit = document.getElementById("btnSubmit");
  const btnLoader = document.getElementById("btnLoader");
  const btnText = document.getElementById("btnText");

  const email = emailEl.value.trim();

  // Estado de Carregamento
  btnSubmit.disabled = true;
  btnLoader.style.display = "inline-block";
  btnText.textContent = "Processando...";
  alertBox.className = "alert d-none";

  try {
    const resp = await fetch("/consulta/api/recuperar-senha?username=" + encodeURIComponent(email), {
      method: "POST"
    });

    const data = await resp.json().catch(() => null);

    alertBox.className = "alert d-block " + (resp.ok ? "alert-success" : "alert-danger");
    alertBox.textContent = data?.mensagem || (resp.ok ? "Solicitação enviada com sucesso!" : "Erro na solicitação.");
    
    if(resp.ok) emailEl.value = "";

  } catch (e) {
    alertBox.className = "alert alert-danger d-block";
    alertBox.textContent = "Falha na conexão com o servidor.";
  } finally {
    // Restaurar Botão
    btnSubmit.disabled = false;
    btnLoader.style.display = "none";
    btnText.textContent = "Enviar Senha Provisória";
  }
}
</script>

</body>
</html>
